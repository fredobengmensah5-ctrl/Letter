<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Poppins,sans-serif;
    background:linear-gradient(135deg,#d0dc20,#ab1e54,#803748);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    transition:1s;
}

.card{
    width:90%;
    max-width:800px;
    background:rgba(30, 188, 98, 0.18);
    backdrop-filter:blur(20px);
    border-radius:30px;
    padding:40px;
    color:#1b1111;
    text-align:center;
    box-shadow:0 20px 50px rgba(126, 181, 17, 0.2);
    animation:fadeIn 2s ease;
    position:relative;
}

h1{
    font-family:'Dancing Script',cursive;
    font-size:55px;
    margin-bottom:20px;
}

#typing{
    font-size:18px;
    line-height:1.9;
    white-space:pre-wrap;
    max-height:450px;
    overflow-y:auto;
    padding:10px 15px;
    text-align:left;
    scroll-behavior:smooth;
}

/* Romantic scrollbar */

#typing::-webkit-scrollbar{
    width:8px;
}

#typing::-webkit-scrollbar-track{
    background:rgba(88, 33, 33, 0.2);
    border-radius:20px;
}

#typing::-webkit-scrollbar-thumb{
    background:#7ea514;
    border-radius:20px;
}

.signature{
    margin-top:30px;
    font-size:22px;
    font-weight:600;
}


/* Floating hearts */

.heart{
    position:absolute;
    color:#7ea514;
    animation:float 10s linear infinite;
    opacity:.7;
}

@keyframes float{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }

}

#choices{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}


#choices button{

    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:#7ea514;
    color:#ff4f81;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;

}


#choices button:hover{

    transform:scale(1.08);
    background:rgb(30, 30, 30);
    color:rgb(184, 174, 46);

}


/* Fade */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:scale(.9);
    }

    to{
        opacity:1;
        transform:scale(1);
    }

}


/* Love Button */

#loveBtn{

    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:50px;
    background:rgb(212, 173, 15);
    color:rgb(30, 30, 30);
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 10px 30px rgba(0,0,0,.2);

}


#loveBtn:hover{

    transform:scale(1.1);
    background:#ff4f81;
    color:rgb(205, 126, 28);

}


#response{

    margin-top:25px;
    font-size:22px;
    font-weight:600;

}


/* Dark mode */

#themeBtn{

    position:absolute;
    top:20px;
    right:20px;
    padding:10px 18px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:rgb(177, 153, 15);
    color:rgb(30, 30, 30);
    font-weight:600;

}


body.dark{

    background:linear-gradient(135deg,#050505,#222,#444);

}


body.dark .card{

    background:rgb(30, 30, 30);
    color:rgb(203, 180, 32);

}


/* Ending screen */

#ending{

    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff4f81,#ff98b8);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:rgb(181, 141, 31);
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:1.5s;
    z-index:999;

}


#ending.show{

    opacity:1;
    pointer-events:auto;

}


#ending h2{

    font-family:'Dancing Script',cursive;
    font-size:65px;

}


#ending p{

    font-size:30px;

}
 
#choices{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}


#choices button{

    padding:15px 30px;
    border:none;
    border-radius:50px;
    background:rgb(200, 173, 17);
    color:rgb(30, 30, 30);
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;

}


#choices button:hover{

    transform:scale(1.08);
    background:rgb(30, 30, 30);
    color:rgb(198, 152, 26);

}

.bigHeart{

    margin-top:40px;
    font-size:90px;
    animation:beat 1s infinite;

}

.choiceButtons{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

#loveBtn{
    animation:fadeButton 1.5s ease;
}

@keyframes fadeButton{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.choiceButtons button{

    padding:15px 30px;
    border:none;
    border-radius:50px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
    background:rgb(190, 173, 18);
    color:rgb(30, 30, 30);
    box-shadow:0 10px 30px rgba(0,0,0,.2);

}


.choiceButtons button:hover{

    transform:scale(1.08);
    background:#ff4f81;
    color:white;

}

@keyframes beat{

    50%{
        transform:scale(1.3);
    }

}

#backBtn{

    margin-top:40px;
    padding:14px 30px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4f81;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;

}


#backBtn:hover{

    transform:scale(1.08);

}

</style>

</head>


<body>


<div class="card">


<button id="themeBtn" onclick="toggleTheme()">
🌙 Dark Mode
</button>


<h1>Her name ❤️</h1>


<div id="typing"></div>


<div class="choiceButtons">

<button id="loveBtn" onclick="showChoices()" style="display:none;">
💖 Will You Be Mine?
</button>

<div id="choices" style="display:none;">

<button onclick="sendAnswer('YES ❤️')">
💖 Yes, I want this
</button>

<button onclick="sendAnswer('NO, I need more time 🌸')">
🌸 No, I need more time
</button>

</div>

</div>


<div id="response"></div>


<div class="signature">

With love,<br>
Your name ❤️

</div>


</div>



<div id="ending">

<h2>The Next Chapter...</h2>

<p>starts with your answer ❤️</p>

<div class="bigHeart">
❤️
</div>

<button onclick="closeEnding()" id="backBtn">
Back to my letter 💌
</button>

</div>



<script>


const message=`You already know I like you — I told you that a while ago.

But the truth is, the more I get to know you, the more certain I become that I don't want us to be just friends.

There is something about you that makes me want to keep choosing you. I admire your heart, your personality, the way you think, and the peace I feel whenever we talk.

I'm not looking for something temporary. If I'm giving my heart to someone, I want it to be something real, intentional, and worth building.

I'm not asking you to rush into anything. I just want you to know where my heart is.

If we are given the chance to build something together, I'll do my best to make you feel loved, respected, appreciated, and safe.

And one day, if everything goes the way I hope it does, I'd love to be the person you proudly introduce to your family.

Not because I asked for that place...

But because I earned it.

❤️`;


let i=0;


function typeWriter(){

if(i < message.length){

document.getElementById("typing").innerHTML += message.charAt(i);

i++;

setTimeout(typeWriter,35);

}

else{

setTimeout(function(){

document.getElementById("loveBtn").style.display="inline-block";

},1500);

}

}


typeWriter();



function showChoices(){

document.getElementById("choices").style.display="flex";

document.getElementById("loveBtn").style.display="none";

}


function showChoices(){

document.getElementById("choices").style.display="flex";

document.getElementById("loveBtn").style.display="none";

}


function sendAnswer(answer){

let phone="233599026776";


let message=
"Fred ❤️ I read your love message.\n\nMy answer is: "
+ answer;


window.location.href=
"https://wa.me/"+phone+"?text="+encodeURIComponent(message);


}


function toggleTheme(){

document.body.classList.toggle("dark");

let btn=document.getElementById("themeBtn");


if(document.body.classList.contains("dark")){

btn.innerHTML="☀️ Light Mode";

}

else{

btn.innerHTML="🌙 Dark Mode";

}

}

function closeEnding(){

document.getElementById("ending").classList.remove("show");

}


for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+10)+"px";

heart.style.animationDuration=(Math.random()*5+5)+"s";

document.body.appendChild(heart);

}


</script>


</body>
</html>
