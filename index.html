<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=1200">

<title>For Ababire ❤️</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">


<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:Poppins,sans-serif;

    background:
    linear-gradient(
        135deg,
        rgb(60,40,20),
        rgb(255,255,255),
        rgb(80,0,80)
    );

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow-x:auto;
    overflow-y:auto;

    transition:1s;

}



/* Main letter card */

.card{

    width:90%;

    max-width:800px;

    background:rgba(255,255,255,0.18);

    backdrop-filter:blur(25px);

    -webkit-backdrop-filter:blur(25px);

    border-radius:35px;

    padding:45px;

    color:#1b1111;

    text-align:center;

    box-shadow:
    0 20px 60px rgba(0,0,0,.25);

    animation:fadeIn 2s ease;

    position:relative;

}



h1{

    font-family:'Dancing Script',cursive;

    font-size:60px;

    margin-bottom:25px;

    color:rgb(80,0,80);

}



/* Letter text */

#typing{

    font-size:18px;

    line-height:2;

    white-space:pre-wrap;

    max-height:450px;

    overflow-y:auto;

    padding:15px;

    text-align:left;

    scroll-behavior:smooth;

}



/* Scroll bar */

#typing::-webkit-scrollbar{

    width:8px;

}


#typing::-webkit-scrollbar-track{

    background:rgba(0,0,0,.1);

    border-radius:20px;

}


#typing::-webkit-scrollbar-thumb{

    background:rgb(200,173,17);

    border-radius:20px;

}




.signature{

    margin-top:35px;

    font-size:23px;

    font-weight:600;

}



/* Floating hearts */

.heart{

    position:absolute;

    color:rgb(200,173,17);

    animation:float 10s linear infinite;

    opacity:.6;

    z-index:-1;

}



@keyframes float{


from{

    transform:translateY(100vh)
    rotate(0deg);

}


to{

    transform:translateY(-120vh)
    rotate(360deg);

}


}




/* First question button */


.choiceButtons{

    display:flex;

    justify-content:center;

    margin-top:35px;

}




#loveBtn{


    padding:16px 40px;

    border:none;

    border-radius:50px;

    background:rgb(200,173,17);

    color:rgb(30,30,30);

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    box-shadow:
    0 10px 30px rgba(0,0,0,.25);

    transition:.4s;

    animation:fadeButton 1.5s ease;

}



#loveBtn:hover{

    transform:scale(1.1);

    background:rgb(80,0,80);

    color:white;

}



/* Dark mode button */


#themeBtn{

    position:absolute;

    top:20px;

    right:20px;

    padding:10px 18px;

    border:none;

    border-radius:30px;

    cursor:pointer;

    background:rgb(200,173,17);

    color:black;

    font-weight:600;

}




/* Dark mode */


body.dark{

    background:
    linear-gradient(
        135deg,
        #050505,
        #222,
        #444
    );

}



body.dark .card{

    background:rgba(0,0,0,.45);

    color:white;

}



body.dark h1{

    color:rgb(200,173,17);

}



/* Ending screen */


#ending{

    position:fixed;

    inset:0;

    background:

    linear-gradient(
    rgba(0,0,0,.25),
    rgba(0,0,0,.25)
    ),

    linear-gradient(
        135deg,
        rgb(60,40,20),
        rgb(255,255,255),
        rgb(80,0,80)
    );


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;


    color:rgb(200,173,17);

    text-align:center;


    opacity:0;

    pointer-events:none;

    transition:1.5s;

    z-index:999;

}



#ending.show{

    opacity:1;

    pointer-events:auto;

}



#ending h2{

    font-family:'Dancing Script',cursive;

    font-size:70px;

    margin-bottom:15px;

}



#ending p{

    font-size:30px;

}



.bigHeart{

    margin:40px 0;

    font-size:100px;

    animation:beat 1s infinite;

}



@keyframes beat{


50%{

    transform:scale(1.25);

}


}



#choices{

    display:flex;

    justify-content:center;

    gap:20px;

    flex-wrap:wrap;

    margin-top:25px;

}



#choices button{

    padding:15px 32px;

    border:none;

    border-radius:50px;

    background:rgb(200,173,17);

    color:rgb(30,30,30);

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    box-shadow:
    0 10px 30px rgba(0,0,0,.25);

    transition:.3s;

}



#choices button:hover{

    transform:scale(1.08);

    background:rgb(80,0,80);

    color:white;

}




#backBtn{

    margin-top:30px;

    padding:15px 35px;

    border:none;

    border-radius:50px;

    background:white;

    color:rgb(80,0,80);

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}



#backBtn:hover{

    transform:scale(1.08);

    background:rgb(200,173,17);

}




@keyframes fadeIn{


from{

    opacity:0;

    transform:scale(.9);

}


to{

    opacity:1;

    transform:scale(1);

}


}



@keyframes fadeButton{


from{

    opacity:0;

    transform:translateY(20px);

}


to{

    opacity:1;

    transform:translateY(0);

}


}




/* Mobile adjustment */




</style>

</head>


<body>


<div class="card">


<button id="themeBtn" onclick="toggleTheme()">

🌙 Dark Mode

</button>



<h1>Ababire ❤️</h1>



<div id="typing"></div>



<div class="choiceButtons">


<button id="loveBtn" onclick="showChoices()" style="display:none;">

Will you take this chance with me?

</button>


</div>




<div class="signature">

With love,<br>

Freddie ❤️

</div>


</div>






<div id="ending">


<h2>The Next Chapter...</h2>


<p>starts with your answer ❤️</p>



<div class="bigHeart">

❤️

</div>




<button onclick="closeEnding()" id="backBtn">

Back to my letter 💌

</button>




<div id="choices">


<button onclick="sendAnswer('YES ❤️')">

Let's make this official

</button>



<button onclick="sendAnswer('NO, I need more time 🌸')">

🌸 I need a little more time

</button>


</div>


</div>






<script>



const message=`You already know I like you—I told you that a while ago.

But the truth is, the more I get to know you, the more certain I become that I don't want us to be just friends.

There's something about you that keeps drawing me closer. I admire your heart, your personality, the way you think, and the sense of peace I feel whenever we talk.

I'm not looking for something temporary. If I'm going to give my heart to someone, I want it to be something real, intentional, and worth building.

I'm not asking you to rush into anything. I just wanted you to know where my heart is.

If we're given the chance to build something together, I'll do my best to make you feel loved, respected, appreciated, understood, and safe.

And maybe one day, if life is kind to us, I'd love to be the person you proudly introduce to your family.

Not because I asked for that place—

But because I earned it.

❤️`;



let i=0;



function typeWriter(){


if(i < message.length){


document.getElementById("typing").innerHTML += message.charAt(i);


i++;


setTimeout(typeWriter,35);


}


else{


setTimeout(()=>{


document.getElementById("loveBtn").style.display="inline-block";


},1500);


}


}



typeWriter();






function showChoices(){


document.getElementById("ending").classList.add("show");


}





function sendAnswer(answer){


let phone="233599026776";



let message=

"Fred ❤️ I read your love message.\n\nMy answer is: "

+ answer;



window.location.href=

"https://wa.me/"+phone+"?text="+encodeURIComponent(message);



}







function toggleTheme(){


document.body.classList.toggle("dark");



let btn=document.getElementById("themeBtn");



if(document.body.classList.contains("dark")){


btn.innerHTML="☀️ Light Mode";


}

else{


btn.innerHTML="🌙 Dark Mode";


}



}






function closeEnding(){


document.getElementById("ending").classList.remove("show");


}







for(let i=0;i<40;i++){


let heart=document.createElement("div");


heart.className="heart";


heart.innerHTML="❤";


heart.style.left=Math.random()*100+"vw";


heart.style.fontSize=(Math.random()*25+10)+"px";


heart.style.animationDuration=(Math.random()*5+5)+"s";


document.body.appendChild(heart);



}



</script>



</body>

</html>
